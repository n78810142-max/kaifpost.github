<div style="max-width: 500px; margin: 20px auto; text-align: center; font-family: sans-serif;">
    
    <input type="file" id="fileInput" accept="video/*">
    
    <div id="videoBox" style="margin-top:20px; display:none;">
        <video id="player" width="500" controls style="background:#000; border-radius:10px;"></video>
        <p id="msg" style="color: green; font-size: 12px;"></p>
        <button onclick="clearVideo()" style="color:red; cursor:pointer; border:none; background:none;">[Удалить видео]</button>
    </div>

</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const player = document.getElementById('player');
    const videoBox = document.getElementById('videoBox');
    const msg = document.getElementById('msg');

    // 1. СРАЗУ ПОКАЗЫВАЕМ ПРИ ВЫБОРЕ
    fileInput.onchange = function(e) {
        const file = e.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            player.src = url;
            videoBox.style.display = 'block';
            saveVideo(file);
        }
    };

    // 2. ФУНКЦИЯ СОХРАНЕНИЯ (IndexedDB)
    function saveVideo(file) {
        const request = indexedDB.open("SimpleVideoDB", 1);
        request.onupgradeneeded = (e) => e.target.result.createObjectStore("videos");
        request.onsuccess = (e) => {
            const db = e.target.result;
            const tx = db.transaction("videos", "readwrite");
            tx.objectStore("videos").put(file, "current");
            msg.innerText = "Видео сохранено в браузере!";
        };
    }

    // 3. ЗАГРУЗКА ПРИ ОБНОВЛЕНИИ СТРАНИЦЫ
    window.onload = function() {
        const request = indexedDB.open("SimpleVideoDB", 1);
        request.onsuccess = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains("videos")) return;
            
            const tx = db.transaction("videos", "readonly");
            const getReq = tx.objectStore("videos").get("current");
            getReq.onsuccess = () => {
                if (getReq.result) {
                    player.src = URL.createObjectURL(getReq.result);
                    videoBox.style.display = 'block';
                    msg.innerText = "Загружено из памяти";
                }
            };
        };
    };

    function clearVideo() {
        indexedDB.deleteDatabase("SimpleVideoDB");
        location.reload();
    }
</script>
<div id="simple-comment-root" style="all: initial; font-family: sans-serif; display: block; max-width: 500px; margin: 20px auto; padding: 10px;">
    
    <div style="background: #f9f9f9; padding: 15px; border: 1px solid #ddd; border-radius: 8px;">
        <textarea id="cmnt-text" placeholder="Ваш комментарий..." style="width: 100%; height: 60px; margin-bottom: 10px; display: block; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; padding: 5px;"></textarea>
        
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <input type="file" id="cmnt-file" accept="image/*" style="font-size: 12px; max-width: 60%;">
            <button onclick="postCmnt()" style="background: #28a745; color: white; border: none; padding: 7px 15px; border-radius: 4px; cursor: pointer;">Ок</button>
        </div>
    </div>

    <div id="cmnt-list" style="margin-top: 20px;"></div>

    <script>
        const storageKey = 'site_comments_data';

        function postCmnt() {
            const txt = document.getElementById('cmnt-text');
            const fileInput = document.getElementById('cmnt-file');
            const file = fileInput.files[0];

            if (!txt.value && !file) return;

            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => saveCmnt(txt.value, e.target.result);
                reader.readAsDataURL(file);
            } else {
                saveCmnt(txt.value, null);
            }
            txt.value = ''; fileInput.value = '';
        }

        function saveCmnt(text, img) {
            const data = JSON.parse(localStorage.getItem(storageKey) || '[]');
            data.unshift({ text, img, id: Date.now() });
            localStorage.setItem(storageKey, JSON.stringify(data));
            drawCmnts();
        }

        function drawCmnts() {
            const box = document.getElementById('cmnt-list');
            const data = JSON.parse(localStorage.getItem(storageKey) || '[]');
            box.innerHTML = data.map(i => `
                <div style="border-bottom: 1px dashed #ccc; padding: 10px 0; color: #333;">
                    <p style="margin: 0 0 5px 0; font-size: 14px;">${i.text}</p>
                    ${i.img ? `<img src="${i.img}" style="max-width: 100%; border-radius: 5px; display: block;">` : ''}
                    <span onclick="delCmnt(${i.id})" style="color: red; font-size: 10px; cursor: pointer; text-decoration: underline;">удалить</span>
                </div>
            `).join('');
        }

        function delCmnt(id) {
            let data = JSON.parse(localStorage.getItem(storageKey) || '[]');
            data = data.filter(i => i.id !== id);
            localStorage.setItem(storageKey, JSON.stringify(data));
            drawCmnts();
        }

        drawCmnts();
    </script>
</div>
